<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="A simple Spanish practice web application.">

        <title>Learn Spanish</title>

        <link rel="stylesheet" href="styles/reset.css">
        <link rel="stylesheet" href="styles/style.css">

        <script src="scripts/script.js" defer></script>
    </head>
    <body>
        <main>
            <div class="app">
                <header class="app-header">
                    <div>
                        <!--<p class="eyebrow">Spanish practice</p>-->
                        <!--<h1>Complete the sentence</h1>-->
                        <h1>Learn Spanish</h1>
                    </div>
                    <div class="score" aria-live="polite">
                        <span id="scoreValue">0</span>
                        <small>correct</small>
                    </div>
                </header>
            
                <!-- Card -->
                <section class="card" aria-labelledby="lessonTitle">
                    <!-- Progress Bar -->
                    <div class="progress-row">
                        <span id="lessonTitle">Question <strong id="questionNumber">1</strong></span>
                        <span id="progressText">1 / 6</span>
                    </div>
                    <!-- / END: Progress Bar -->
            
                    <div class="progress-track" aria-hidden="true">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                
                    <p class="instruction">Choose the missing Spanish word.</p>
                
                    <div id="sentence" class="sentence" aria-live="polite"></div>
                
                    <div id="wordOptions" class="word-options" aria-label="Word choices"></div>
                
                    <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
            
                    <div id="translationPanel" class="translation-panel" hidden>
                        <span>English</span>
                        <p id="translationText"></p>
                    </div>
            
                    <div class="actions">
                        <button id="resetButton" class="button button--secondary" type="button">Start over</button>
                        <button id="nextButton" class="button button--primary" type="button" disabled>Next sentence</button>
                    </div>
                </section>
                <!-- / END: Card -->
        
                <!--<section class="tip-card">
                <h2>Easy to extend</h2>
                <p>Add more exercises to the <code>lessons</code> array in <code>script.js</code>. Each lesson includes a sentence, missing word, choices, and English translation.</p>
                </section>-->
            </div>
        </main>
    </body>
</html>
